<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="fas fa-bus"></i> Gestão de Transportes</a>
        <button class="btn btn-outline-light btn-sm" onclick="toggleTheme()">Alternar Tema</button>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-8">
            <div class="card p-4">
                <h4><i class="fas fa-ticket-alt"></i> Novo Registro</h4>
                <hr>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label>Destino</label>
                        <select id="destino" class="form-select" onchange="atualizarValor()">
                            <option value="40">São Raimundo Nonato</option>
                            <option value="30">Anísio de Abreu</option>
                            <option value="25">São Braz</option>
                            <option value="18">Gameleira</option>
                            <option value="manual">Outro</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label>Valor (R$)</label>
                        <input type="number" id="valor" class="form-control" readonly>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4">
                <h5><i class="fas fa-cog"></i> Preços</h5>
                <input type="text" class="form-control mb-2" placeholder="Ex: Ajustar preço SRN">
                <button class="btn btn-success w-100">Salvar Alterações</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Alternar modo claro/escuro
    function toggleTheme() {
        const html = document.documentElement;
        html.dataset.bsTheme = html.dataset.bsTheme === 'light' ? 'dark' : 'light';
    }

    // Atualizar valor automaticamente
    function atualizarValor() {
        const select = document.getElementById('destino');
        const input = document.getElementById('valor');
        input.value = select.value === 'manual' ? '' : select.value;
        if(select.value === 'manual') input.readOnly = false;
        else input.readOnly = true;
    }
</script>

</body>
</html>
